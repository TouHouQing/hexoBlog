name: Deploy Hexo Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hexo-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh contributions data
        env:
          GITHUB_CONTRIB_USERNAME: touhouqing
        run: node tools/update-github-contributions.mjs

      - name: Configure SSH for hexo deploy
        if: ${{ secrets.HEXO_DEPLOY_PRIVATE_KEY != '' }}
        env:
          HEXO_DEPLOY_PRIVATE_KEY: ${{ secrets.HEXO_DEPLOY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$HEXO_DEPLOY_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build and deploy
        if: ${{ secrets.HEXO_DEPLOY_PRIVATE_KEY != '' }}
        run: |
          npm run clean
          npm run build
          npm run deploy

      - name: Missing deploy key
        if: ${{ secrets.HEXO_DEPLOY_PRIVATE_KEY == '' }}
        run: echo "HEXO_DEPLOY_PRIVATE_KEY is not configured. Skipping deploy."
