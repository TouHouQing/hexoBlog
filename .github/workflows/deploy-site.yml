name: Deploy Hexo Site

on:
  push:
    branches:
      - main
    paths-ignore:
      - source/data/github-contributions.json
  schedule:
    - cron: "20 1 * * *"
  workflow_run:
    workflows:
      - Update GitHub Contributions
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-hexo-site
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      HEXO_DEPLOY_PRIVATE_KEY: ${{ secrets.HEXO_DEPLOY_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh contributions data
        env:
          GITHUB_CONTRIB_USERNAME: touhouqing
        run: node tools/update-github-contributions.mjs

      - name: Configure SSH for hexo deploy
        if: ${{ env.HEXO_DEPLOY_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$HEXO_DEPLOY_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity
        if: ${{ env.HEXO_DEPLOY_PRIVATE_KEY != '' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

      - name: Build and deploy
        if: ${{ env.HEXO_DEPLOY_PRIVATE_KEY != '' }}
        run: |
          npm run clean
          npm run build
          npm run deploy

      - name: Missing deploy key
        if: ${{ env.HEXO_DEPLOY_PRIVATE_KEY == '' }}
        run: |
          echo "HEXO_DEPLOY_PRIVATE_KEY is not configured. Deployment cannot continue."
          exit 1
