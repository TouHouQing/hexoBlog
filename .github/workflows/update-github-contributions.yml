name: Update GitHub Contributions

on:
  push:
    branches:
      - main
    paths-ignore:
      - source/data/github-contributions.json
  workflow_dispatch:
    inputs:
      force:
        description: Force refresh even if today's sync already succeeded
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: update-github-contributions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      HEXO_DEPLOY_PRIVATE_KEY: ${{ secrets.HEXO_DEPLOY_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check whether scheduled sync is still needed
        id: sync_guard
        run: |
          should_run=true
          force_refresh=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            force_refresh=true
          fi

          if [ "$force_refresh" = "true" ]; then
            echo "Force refresh requested."
          elif [ "${{ github.event_name }}" != "push" ] && [ -f source/data/github-contributions.json ]; then
            today=$(TZ=Asia/Shanghai date +%F)
            last_sync=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('source/data/github-contributions.json','utf8')); if (!data.generatedAt) process.exit(0); const formatter=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}); console.log(formatter.format(new Date(data.generatedAt)));")

            if [ "$last_sync" = "$today" ]; then
              should_run=false
              echo "Scheduled sync already completed on ${today} (Asia/Shanghai)."
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Update contributions data
        if: steps.sync_guard.outputs.should_run == 'true'
        env:
          GITHUB_CONTRIB_USERNAME: touhouqing
        run: node tools/update-github-contributions.mjs

      - name: Commit updated data
        if: steps.sync_guard.outputs.should_run == 'true'
        id: commit_data
        run: |
          if git diff --quiet -- source/data/github-contributions.json; then
            echo "No contribution changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/data/github-contributions.json
          git commit -m "chore: refresh github contributions data"
          git push
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Configure SSH for hexo deploy
        if: steps.commit_data.outputs.has_changes == 'true' && env.HEXO_DEPLOY_PRIVATE_KEY != ''
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$HEXO_DEPLOY_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure Git identity for deploy
        if: steps.commit_data.outputs.has_changes == 'true' && env.HEXO_DEPLOY_PRIVATE_KEY != ''
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

      - name: Build and deploy refreshed site
        if: steps.commit_data.outputs.has_changes == 'true' && env.HEXO_DEPLOY_PRIVATE_KEY != ''
        run: |
          npm run clean
          npm run build
          npm run deploy

      - name: Missing deploy key for scheduled refresh
        if: steps.commit_data.outputs.has_changes == 'true' && env.HEXO_DEPLOY_PRIVATE_KEY == ''
        run: |
          echo "HEXO_DEPLOY_PRIVATE_KEY is not configured. Contributions data was updated, but site deployment cannot continue."
          exit 1

      - name: Skip duplicate scheduled sync
        if: steps.sync_guard.outputs.should_run != 'true'
        run: echo "Skipping because today's scheduled sync has already succeeded."
