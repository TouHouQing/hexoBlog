name: Update GitHub Contributions

on:
  push:
    branches:
      - main
    paths-ignore:
      - source/data/github-contributions.json
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-github-contributions
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update contributions data
        env:
          GITHUB_CONTRIB_USERNAME: touhouqing
        run: node tools/update-github-contributions.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- source/data/github-contributions.json; then
            echo "No contribution changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/data/github-contributions.json
          git commit -m "chore: refresh github contributions data"
          git push
