name: Schedule GitHub Contributions Update

on:
  schedule:
    - cron: "2 1 * * *"
    - cron: "37 1 * * *"
    - cron: "13 2 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: schedule-github-contributions
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch update workflow
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "update-github-contributions.yml",
              ref: "main",
              inputs: {
                force: "false"
              }
            })

            core.info(`Dispatch response status: ${response.status}`)
