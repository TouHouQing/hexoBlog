<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OPC 风险与路径重构封面</title>
  <desc id="desc">浅底杂志风封面，黑红对比和几何构图，表达从全职冲刺转向副业闭环。</desc>
  <defs>
    <style>
      .bg { fill: #f2eee7; }
      .ink { fill: #121212; }
      .muted { fill: #4a4a4a; }
      .alert { fill: #d92b2b; }
      .title { font: 900 86px 'Arial Black', 'PingFang SC', 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
      .subtitle { font: 600 28px 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; }
      .label { font: 700 18px 'Avenir Next', 'PingFang SC', 'Noto Sans SC', sans-serif; letter-spacing: 2px; }
      .kicker { font: 700 26px 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; }
      .body { font: 600 20px 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif; }
      .mono { font: 700 16px 'Menlo', 'SFMono-Regular', monospace; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="0" y="0" width="1600" height="38" class="ink"/>
  <rect x="0" y="862" width="1600" height="38" class="ink"/>
  <rect x="1040" y="0" width="560" height="900" class="ink"/>

  <g opacity="0.14">
    <rect x="1070" y="72" width="480" height="54" fill="#ffffff"/>
    <rect x="1110" y="158" width="440" height="54" fill="#ffffff"/>
    <rect x="1070" y="244" width="480" height="54" fill="#ffffff"/>
    <rect x="1110" y="330" width="440" height="54" fill="#ffffff"/>
    <rect x="1070" y="416" width="480" height="54" fill="#ffffff"/>
    <rect x="1110" y="502" width="440" height="54" fill="#ffffff"/>
    <rect x="1070" y="588" width="480" height="54" fill="#ffffff"/>
    <rect x="1110" y="674" width="440" height="54" fill="#ffffff"/>
  </g>

  <polygon points="1030,0 1115,0 660,900 575,900" class="alert"/>
  <polygon points="980,0 1022,0 567,900 525,900" fill="#121212"/>

  <text x="86" y="96" class="label ink">OPC / SUPER INDIVIDUAL / 2026</text>

  <text x="86" y="210" class="title ink">我不再</text>
  <text x="86" y="305" class="title ink">全职做OPC</text>
  <text x="86" y="400" class="title ink">了</text>

  <rect x="86" y="444" width="848" height="4" class="ink"/>

  <text x="86" y="516" class="subtitle ink">把一人公司当副业，我反而更看清了这条路</text>
  <text x="86" y="560" class="subtitle muted">先跑通需求、交付、复购，再谈公司化</text>

  <g>
    <rect x="86" y="620" width="260" height="116" fill="#121212"/>
    <text x="112" y="666" class="kicker" fill="#f2eee7">路径修正</text>
    <text x="112" y="706" class="body" fill="#f2eee7">All in → Side project</text>
  </g>

  <g>
    <rect x="372" y="620" width="260" height="116" fill="#d92b2b"/>
    <text x="398" y="666" class="kicker" fill="#f2eee7">核心公式</text>
    <text x="398" y="706" class="body" fill="#f2eee7">技术 × 变现 × 风险</text>
  </g>

  <g>
    <rect x="658" y="620" width="276" height="116" fill="#121212"/>
    <text x="684" y="666" class="kicker" fill="#f2eee7">执行顺序</text>
    <text x="684" y="706" class="body" fill="#f2eee7">先现金流，后主体化</text>
  </g>

  <text x="1086" y="790" class="mono" fill="#f2eee7">TOHOQING / THINKING NOTE</text>
  <text x="1086" y="824" class="mono" fill="#f2eee7">ARTICLE COVER / HEXO BUTTERFLY</text>
</svg>
